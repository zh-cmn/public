rules:
  # 本机、局域网、私有地址直连
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve

  - DST-PORT,53,DNS_Hijack
  - OR,((RULE-SET,google-fcm),(RULE-SET,microsoft-cn),(RULE-SET,apple-cn),(RULE-SET,google-cn)),DIRECT
  - RULE-SET,proxy_domain,PROXY
  - RULE-SET,global_ai,PROXY
  - OR,((RULE-SET,global_media),(RULE-SET,global_mediaip),(RULE-SET,telegramip)),PROXY
  - OR,((RULE-SET,cn_ip),(RULE-SET,cn_domain),(RULE-SET,private_ip),(RULE-SET,private_domain)),DIRECT
  - MATCH,DIRECT
