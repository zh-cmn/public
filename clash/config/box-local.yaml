# 基于box_1.2.7(1bee0a3) https://github.com/boxproxy/box
# 详细配置参考 https://wiki.metacubex.one/config
# 本地socks代理

mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
mode: Rule
bind-address: '*'
ipv6: true
allow-lan: true
unified-delay: false
tcp-concurrent: true
log-level: error
find-process-mode: always
# global-client-fingerprint: random
external-controller: 0.0.0.0:9090
external-ui: ./dashboard

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  exclude-uid: [10314,10366]
  enable: true
  device: meta
  stack: gvisor
  dns-hijack: [any:53, tcp://any:53]
  udp-timeout: 300
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  strict-route: false

# 自定义DNS和FCM hosts
hosts:
  mtalk.google.com: [74.125.200.188, 74.125.126.188, 142.250.115.188]

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:Fake-IP-Filter"
    - mtalk.google.com
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
# 强制google cloudflare dns连接PROXY
  nameserver-policy:
    "+.c.mi.com":
      - "https://dns.google/dns-query#PROXY"
      - "https://cloudflare-dns.com/dns-query#PROXY"
    "rule-set:cn_domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

# 避免 DNS 请求被 MATCH 到普通代理组
proxies:
  - name: DNS_Hijack
    type: dns

  - name: "S5-LOCAL-6789"
    type: socks5
    server: 127.0.0.1
    port: 6789
    udp: true

# 强制google cloudflare dns连接PROXY
proxy-groups:
  - name: "PROXY"
    type: select
    exclude-type: "dns"
    proxies:
      - "S5-LOCAL-6789"

# 添加直连项目
rule-providers:
  Fake-IP-Filter:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    path: ./rule_provider/Fake-IP-Filter.mrs
    url: "https://ghfast.top/github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/fakeip-filter.mrs"
